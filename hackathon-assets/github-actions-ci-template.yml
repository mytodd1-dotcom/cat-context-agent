name: CAT Context Agent CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify submission evidence
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify submission evidence chain
        run: npm run submission:verify

      - name: Generate live DataHub runbook
        run: npm run datahub:runbook

      - name: Run DataHub readiness doctor
        run: npm run datahub:doctor

      - name: Generate DataHub integration checklist
        run: npm run datahub:checklist

      - name: Generate DataHub claim audit
        run: npm run datahub:audit

      - name: Generate DataHub MCP handoff
        run: npm run datahub:mcp

      - name: Run MCP adapter smoke test
        run: npm run mcp:smoke

      - name: Generate submission honesty audit
        run: npm run submission:honesty

      - name: Generate judge walkthrough
        run: npm run judge:walkthrough

      - name: Generate judge FAQ
        run: npm run judge:faq

      - name: Validate generated artifacts
        run: npm run artifacts:validate

      - name: Build and test
        run: npm test

# Local equivalent:
# npm run ci:local
