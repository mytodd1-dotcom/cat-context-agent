name: CAT Context Agent CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify submission evidence
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify submission evidence chain
        run: npm run submission:verify

      - name: Validate generated artifacts
        run: npm run artifacts:validate

      - name: Build and test
        run: npm test

# Local equivalent:
# npm run ci:local
